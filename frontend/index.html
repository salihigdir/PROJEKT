<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drucker-Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Drucker-Monitoring Dashboard</h1>
    <p>Überwachung der Netzwerkdrucker: online / offline</p>
  </header>

  <main>
    <section class="summary">
      <div class="summary-box">
        <span id="onlineCount">0</span>
        <p>Online</p>
      </div>

      <div class="summary-box">
        <span id="offlineCount">0</span>
        <p>Offline</p>
      </div>

      <button id="refreshButton" class="refresh-button">Aktualisieren</button>
    </section>

    <section id="printerContainer" class="printer-container">
      <p>Druckerstatus wird geladen...</p>
    </section>
  </main>

  <footer>
    <p>Letzte automatische Aktualisierung: <span id="refreshTime">-</span></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
